find_speaker_task:
  description: >
    Search through the provided {team_transcription} to locate the section or segment
    that belongs to {employee_name}. Identify the employee by name or speaker label
    and isolate their portion of the transcription for downstream processing.
    If {employee_name} cannot be found, return a clear message stating they were not present.
  expected_output: >
    A single block of transcription text belonging to {employee_name}, clearly
    labelled with their name. If not found, return a plain message:
    "Employee {employee_name} not found in transcription."
  agent: find_speaker

transcription_extraction_task:
  description: >
    Using the raw transcription segment for {employee_name} passed from the
    find_speaker agent, extract every line or statement directly spoken by or
    attributed to {employee_name}. Do not include any content from other speakers.
    Once extracted, rewrite the content in a professional, grammatically correct,
    and clearly structured tone. Eliminate all filler words (e.g. "um", "uh", "like",
    "you know"), correct incomplete sentences, fix grammatical errors, and rephrase
    informal language into formal business English. The meaning, intent, and all
    technical details of what {employee_name} said must be fully preserved — nothing
    may be added, inferred, or omitted. The final output must read as a polished
    written update authored by {employee_name}.
  expected_output: >
    A clean, professionally written summary of everything {employee_name} communicated
    during the standup, structured as follows:

    Employee: {employee_name}

    Extracted and Proofread Standup Update:
    <polished prose or bullet points rewritten in professional business English,
    preserving all technical content and original meaning, free of filler words
    and grammatical errors>

    Original tone issues corrected:
    - <brief note on corrections made, e.g. "Removed filler words", "Corrected
      tense inconsistencies", "Rephrased informal phrasing">
  agent: transcription_extractor

employee_detection_task:
  description: >
    Using the transcription segment extracted by the find_speaker agent for {employee_name},
    determine whether {employee_name} was genuinely present and speaking in the standup.
    Use {team_transcription} as the full reference source to cross-check if needed.
    Check for their name, initials, or any speaker labels that could identify them.
    Confirm presence or absence clearly before any further processing takes place.
  expected_output: >
    A short detection report containing:
    - Employee name searched for: {employee_name}
    - Detection result: Present or Not Present
    - Confidence level: High, Medium, or Low
    - Brief reasoning (one to two sentences) explaining how the conclusion was reached
  agent: employee_detection

content_extraction_task:
  description: >
    Using the isolated transcription segment for {employee_name} passed from the
    find_speaker agent, extract all tasks and work items they mentioned. Separate
    the extracted items into two groups:
    1. Previous day tasks — work {employee_name} completed or worked on yesterday
    2. Current day tasks — work {employee_name} plans to do or is doing today
    Ignore any blockers, general comments, or non-task statements unless they directly
    describe a piece of work.
  expected_output: >
    A structured extraction result for {employee_name} containing two clearly labelled lists:
    Previous Day Tasks:
      - Raw task description as stated in the transcription (one item per line)
    Today's Tasks:
      - Raw task description as stated in the transcription (one item per line)
    If no tasks are found in either group, state "None mentioned" for that group.
  agent: content_extraction

task_generation_task:
  description: >
    Take the raw extracted task lists for {employee_name} from the content_extraction
    agent and convert each item into a properly structured task entry. For every task, produce:
    - A short, action-oriented title (maximum 8 words)
    - A clear description (two to three sentences) explaining what the task involves
    - A day label indicating whether it is a Previous Day task or a Today task
    Maintain the original grouping. Do not merge or split tasks unless two items
    clearly describe the same piece of work.
  expected_output: >
    A structured list of task entries for {employee_name} grouped by day, in the
    following format for each:

    Employee: {employee_name}
    Task Title: <title>
    Description: <description>
    Day: Previous Day | Today

    Produce one entry per extracted task item.
  agent: task_generation

time_estimation_task:
  description: >
    Review each structured task entry for {employee_name} produced by the
    task_generation agent and assign a realistic time estimate in hours. Base estimates
    on the task title, description, and standard software engineering effort norms.
    Ensure the combined total of all Today's tasks does not exceed 8 hours. Previous
    Day tasks are logged for record purposes only and still require estimates.
    Flag any task with a description too vague to estimate by marking it as
    "Needs Clarification" instead of assigning a number.
  expected_output: >
    The full list of task entries for {employee_name} with an estimated_hours field
    added to each, in the following format:

    Employee: {employee_name}
    Task Title: <title>
    Description: <description>
    Day: Previous Day | Today
    Estimated Hours: <number> | Needs Clarification

    Include a summary line at the end:
    Total estimated hours for Today ({employee_name}): <sum>
  agent: time_estimation

schedule_task:
  description: >
    Using the time-estimated task list for {employee_name} from the time_estimation
    agent, assign a start time and end time to each of Today's tasks for {today_date}.
    Schedule tasks sequentially starting from 09:00, allowing a 15-minute buffer between
    each task. Use a standard working day of 09:00 to 17:00. Previous Day tasks do not
    require scheduling — include them in the output as completed entries with no time slot.
    If the total estimated hours for Today exceed the available working hours, flag the
    overflow tasks clearly rather than exceeding 17:00.
  expected_output: >
    A complete scheduled task list for {employee_name} on {today_date} in the following
    format for each entry:

    Employee: {employee_name}
    Date: {today_date}
    Task Title: <title>
    Description: <description>
    Day: Previous Day | Today
    Estimated Hours: <number>
    Start Time: <HH:MM> | N/A (Previous Day)
    End Time: <HH:MM> | N/A (Previous Day)

    Include a note at the end if any tasks could not be scheduled due to time overflow.
  agent: schedule

timesheet_export_task:
  description: >
    Take the fully scheduled task list for {employee_name} on {today_date} from the
    schedule agent and generate a clean CSV timesheet file. Each row must represent
    one task. Include the following columns:
    - employee_name (use value: {employee_name})
    - task_title
    - description
    - day (Previous Day or Today)
    - estimated_hours
    - start_time
    - end_time
    - status (Completed for Previous Day tasks, Scheduled for Today tasks)
    Ensure there are no empty required fields. Replace any "N/A" start and end time
    values for Previous Day tasks with empty strings in the CSV. The file must be
    named timesheet_{employee_name}_{today_date}.csv.
  expected_output: >
    A valid CSV file saved as timesheet_{employee_name}_{today_date}.csv containing
    one header row and one data row per task. All fields must be populated. The file
    must open correctly in a spreadsheet application without errors or formatting issues.
  agent: timesheet_export
  output_file: "timesheet_{employee_name}_{today_date}.csv"